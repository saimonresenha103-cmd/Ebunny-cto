<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$EBUNNY - The Golden Era is Live!</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-white: #FFFFFF;
            --bg-sand: #F5DEB3; 
            --text-dark: #3E2723; 
        }

        body {
            margin: 0;
            padding-top: 70px; 
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-white) 0%, var(--bg-sand) 100%);
            color: var(--text-dark);
            text-align: center;
            overflow-x: hidden;
        }

        /* MENU DE NAVEGAÇÃO */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary-gold);
            display: flex;
            overflow-x: auto;
            padding: 10px;
            gap: 10px;
            z-index: 9999;
            justify-content: center;
        }

        .nav-btn {
            background: var(--primary-gold);
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        /* PAGINAÇÃO */
        .page-content { display: none; padding: 20px; }
        .active { display: block; }

        header { padding: 2rem; background: rgba(255, 255, 255, 0.6); border-bottom: 3px solid var(--primary-gold); }
        h1 { font-size: 3.5rem; margin: 0; color: var(--primary-gold); }

        .hero-image { width: 90%; max-width: 500px; border-radius: 20px; border: 4px solid var(--primary-gold); margin-top: 20px; }
        
        .ca-box {
            background: white;
            padding: 15px;
            border-radius: 50px;
            border: 2px solid var(--primary-gold);
            margin: 20px auto;
            max-width: 90%;
            word-break: break-all;
            font-family: monospace;
            font-weight: bold;
        }

        .btn {
            background: var(--primary-gold);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            margin: 10px;
            border: none;
            cursor: pointer;
        }

        /* CASINO */
        .slot-machine {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            border: 4px solid var(--primary-gold);
            display: inline-block;
            margin-top: 20px;
        }
        .slot-row { display: flex; gap: 10px; font-size: 3rem; margin-bottom: 20px; }
        .slot-cell { background: #000; padding: 10px; border-radius: 10px; min-width: 70px; color: gold; }

        /* MISSION */
        .mission-img { width: 100%; max-width: 400px; border-radius: 20px; border: 2px solid var(--primary-gold); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="nav-btn" onclick="openPage('home')">🏠 HOME</button>
        <button class="nav-btn" onclick="openPage('earn')">🎰 EARN</button>
        <button class="nav-btn" onclick="openPage('mission')">🎁 MISSION</button>
        <a href="https://t.me/ebunny2026" target="_blank" class="nav-btn" style="background:#0088cc; text-decoration:none;">✈️ TELEGRAM</a>
    </nav>

    <div id="page-home" class="page-content active">
        <header>
            <h1>$EBUNNY</h1>
            <p><b>THE GOLDEN SOLANA ERA</b></p>
        </header>
        <video src="17668.mp4" class="hero-image" autoplay loop muted playsinline></video>
        <div class="ca-box">2XSSMgjftCwL2xsURjDGZv4FzxZo9Xvx3d5ejrUfXUVm</div>
        <a href="https://t.me/ebunny2026" target="_blank" class="btn" style="background:#0088cc;">JOIN TELEGRAM ✈️</a>
        <button class="btn" onclick="copyCA()">COPY CA 📋</button>
    </div>

    <div id="page-earn" class="page-content">
        <h1>BUNNY CASINO</h1>
        <div class="slot-machine">
            <div class="slot-row">
                <div class="slot-cell" id="s1">🐰</div>
                <div class="slot-cell" id="s2">💰</div>
                <div class="slot-cell" id="s3">🥚</div>
            </div>
            <button class="btn" onclick="spin()">SPIN (0.005 SOL)</button>
        </div>
        <p><i>Web3 Wallet integration coming soon!</i></p>
    </div>

    <div id="page-mission" class="page-content">
        <h1>EASTER MISSION</h1>
        <img src="17763.png" class="mission-img">
        <p>Support children in need this Easter season.</p>
        <div class="ca-box">9tBxpF7bmDox7y7JqCeN1HzcGeC6LrfYao27qBgjM2pU</div>
    </div>

    <script>
        // FUNÇÃO PARA TROCAR DE PÁGINA
        function openPage(pageName) {
            // Esconde todas as páginas
            document.querySelectorAll('.page-content').forEach(page => {
                page.style.display = 'none';
            });
            // Mostra a página clicada
            document.getElementById('page-' + pageName).style.display = 'block';
            window.scrollTo(0,0);
        }

        function copyCA() {
            navigator.clipboard.writeText("2XSSMgjftCwL2xsURjDGZv4FzxZo9Xvx3d5ejrUfXUVm");
            alert("CA Copied! 🐰");
        }

        // SIMULAÇÃO DO CASINO
        function spin() {
            const symbols = ['🐰', '💰', '🥚', '🥕', '💎'];
            document.getElementById('s1').innerText = symbols[Math.floor(Math.random() * symbols.length)];
            document.getElementById('s2').innerText = symbols[Math.floor(Math.random() * symbols.length)];
            document.getElementById('s3').innerText = symbols[Math.floor(Math.random() * symbols.length)];
        }
    </script>
</body>
</html>
