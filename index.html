<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$EBUNNY - The Golden Era is Live!</title>

        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #B8860B;
            --bg-white: #FFFFFF;
            --bg-sand: #F5DEB3; 
            --text-dark: #3E2723; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, var(--bg-white) 0%, var(--bg-sand) 100%);
            color: var(--text-dark);
            text-align: center;
            overflow-x: hidden;
        }

        header {
            padding: 3rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--primary-gold);
            position: relative;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--primary-gold);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.1em;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .hero-section {
            padding: 5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            position: relative;
        }

        .hero-image-container {
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .hero-image {
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
            border: 4px solid var(--primary-gold);
            background: var(--bg-white);
        }
