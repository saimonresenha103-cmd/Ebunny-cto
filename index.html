<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$EBUNNY - The Golden Era is Live!</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #B8860B;
            --bg-white: #FFFFFF;
            --bg-sand: #F5DEB3; 
            --text-dark: #3E2723; 
        }

        body {
            margin: 0;
            padding-top: 70px; 
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, var(--bg-white) 0%, var(--bg-sand) 100%);
            color: var(--text-dark);
            text-align: center;
            overflow-x: hidden;
            scroll-behavior: smooth; 
        }

        /* MENU DE NAVEGAÇÃO INFALÍVEL */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(212, 175, 55, 0.5);
            display: flex;
            overflow-x: auto;
            padding: 10px 15px;
            gap: 15px;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
            align-items: center;
        }

        .top-nav::-webkit-scrollbar { display: none; }
        .top-nav { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-btn {
            background: linear-gradient(45deg, rgba(255, 215, 0, 0.9), rgba(218, 165, 32, 0.9));
            color: #111;
            font-family: Arial, sans-serif;
            font-weight: 900;
            font-size: 0.85rem;
            padding: 8px 18px;
            border-radius: 25px;
            white-space: nowrap;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
            border: 1px solid #FFF;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            user-select: none;
            display: inline-block;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.9);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        header {
            padding: 3rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--primary-gold);
            position: relative;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--primary-gold);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.1em;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .hero-section {
            padding: 5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .hero-image-container {
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .hero-image {
            width: 100%;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
            border: 4px solid var(--primary-gold);
            background: var(--bg-white);
        }

        .ca-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px 40px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            border: 2px solid var(--primary-gold);
            word-break: break-all;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            font-weight: bold;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-gold), #FFDF00, var(--primary-gold));
            background-size: 200% auto;
            color: var(--text-dark);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.5s;
            text-decoration: none;
            display: inline-block;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .btn:hover {
            background-position: right center;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.6);
        }

        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap; 
        }

        /* Tokenomics */
        .tokenomics-section {
            padding: 6rem 1rem;
            background: var(--bg-white);
            border-top: 2px solid rgba(212, 175, 55, 0.3);
        }

        .tokenomics-section h2, .roadmap-section h2, .videos-section h2, .chart-section h2, .game-section h2, .mission-section h2 {
            color: var(--primary-gold);
            font-size: 3.5rem;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .tokenomics-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-box {
            background: linear-gradient(135deg, var(--bg-white) 0%, var(--bg-sand) 100%);
            border: 3px solid var(--primary-gold);
            border-radius: 20px;
            padding: 30px;
            min-width: 200px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: transform 0.3s;
        }

        .stat-box:hover { transform: translateY(-10px); }

        .stat-box h3 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin: 0;
            font-weight: 900;
        }

        .stat-box p {
            font-size: 1.1rem;
            color: var(--secondary-gold);
            font-weight: bold;
            margin: 10px 0 0 0;
        }

            background: rgba(255, 255, 255, 0.5);
            border-top: 2px solid rgba(212, 175, 55, 0.3);

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .roadmap-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        .roadmap-card {
            background: var(--bg-white);

            border-radius: 15px;
            padding: 25px;
            text-align: left;

            margin: 0 0 10px 0;
            color: var(--text-dark);
            font-size: 1.8rem;
        }
