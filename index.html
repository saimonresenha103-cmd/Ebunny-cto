    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --dark-bg: #0a0a0a;
            --primary-gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.05);
            --text-gray: #cccccc;
        }

        body {
            margin: 0;
            padding-top: 80px;
            font-family: 'Montserrat', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* PREMIUM NAVIGATION */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .nav-container { display: flex; gap: 15px; padding: 0 20px; overflow-x: auto; }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-btn {
            background: transparent;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .nav-btn:hover { background: var(--gold-gradient); color: #000; }

        /* SECTION STYLING */
        section { padding: 80px 20px; max-width: 1100px; margin: auto; text-align: center; }
        .hidden { display: none; }
        
        h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 5vw, 4rem); 
            background: var(--gold-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 40px; 
            text-transform: uppercase;
        }

        /* --- HERO SECTION --- */
        .hero-title { 
            font-size: clamp(4rem, 12vw, 8rem); 
            margin: 0; 
            font-family: 'Playfair Display', serif; 
            background: var(--gold-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .ca-display {
            background: #111;
            padding: 20px 30px;
            border-radius: 15px;
            border: 1px solid var(--primary-gold);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            cursor: pointer;
            word-break: break-all;
        }

        .hero-vid {
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            border: 3px solid var(--primary-gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            margin-bottom: 30px;
        }

        /* --- FORTUNE BUNNY CASINO --- */
        .game-card {
            max-width: 420px;
            margin: auto;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            padding: 40px 30px;
            border-radius: 50px;
            border: 3px solid var(--primary-gold);
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.2);
        }

        .slot-machine {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #0d0d0d;
            padding: 25px;
            border-radius: 25px;
            border: 1px solid #333;
            margin: 25px 0;
        }

        .slot-cell {
            height: 100px;
            background: #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 1px solid #222;
        }

        .spin-btn {
            width: 100%;
            padding: 22px;
            border-radius: 50px;
            border: none;
            background: var(--gold-gradient);
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            text-transform: uppercase;
            color: #000;
            transition: 0.2s;
        }

        .spin-btn:active { transform: scale(0.96); }

        /* --- MISSION SECTION --- */
        .mission-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 50px;
            align-items: center;
            text-align: left;
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .mission-img {
            width: 100%;
            border-radius: 25px;
            border: 2px solid var(--primary-gold);
        }

        .mission-text p { font-size: 1.1rem; line-height: 1.8; color: var(--text-gray); }

        @media (max-width: 850px) {
            .mission-container { grid-template-columns: 1fr; padding: 30px; }
        }

        footer { padding: 40px; opacity: 0.5; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
