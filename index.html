<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$EBUNNY - The Golden Era is Live!</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #B8860B;
            --bg-white: #FFFFFF;
            --bg-sand: #F5DEB3; 
            --text-dark: #3E2723; 
        }

        body {
            margin: 0;
            padding-top: 70px; 
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, var(--bg-white) 0%, var(--bg-sand) 100%);
            color: var(--text-dark);
            text-align: center;
            overflow-x: hidden;
            scroll-behavior: smooth; 
        }

        /* MENU DE NAVEGAÇÃO À PROVA DE FALHAS */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(212, 175, 55, 0.5);
            display: flex;
            overflow-x: auto;
            padding: 10px 15px;
            gap: 15px;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        .top-nav::-webkit-scrollbar { display: none; }
        .top-nav { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-btn {
            background: linear-gradient(45deg, rgba(255, 215, 0, 0.9), rgba(218, 165, 32, 0.9));
            color: #111;
            font-family: Arial, sans-serif;
            font-weight: 900;
            font-size: 0.85rem;
            padding: 8px 18px;
            border-radius: 25px;
            white-space: nowrap;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
            border: 1px solid #FFF;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: transform 0.2s;
            cursor: pointer;
            display: inline-block;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        header {
            padding: 3rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--primary-gold);
            position: relative;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--primary-gold);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.1em;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: bold;
        }

        .hero-section {
            padding: 5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
