<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$EBUNNY - The Golden Era</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary-gold: #D4AF37;
        }

        body {
            margin: 0;
            padding-top: 80px;
            font-family: 'Montserrat', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Nav Profissional */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--primary-gold);
        }

        .nav-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 0 20px;
        }

        .nav-btn {
            background: transparent;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: var(--gold-gradient);
            color: #000;
        }

        /* Hero Section */
        header {
            padding: 100px 20px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Jogo Fortune Bunny (Estilo Tigrinho) */
        .game-container {
            max-width: 450px;
            margin: 50px auto;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 40px;
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        .game-header {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .slot-machine {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: #000;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--primary-gold);
            margin-bottom: 20px;
        }

        .slot-cell {
            height: 100px;
            background: #111;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 1px solid #222;
            transition: transform 0.1s;
        }

        .spin-btn {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: none;
            background: var(--gold-gradient);
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #886600;
        }

        .spin-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #886600;
        }

        .balance-box {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #ddd;
        }

        #status-msg {
            height: 30px;
            margin-top: 10px;
            font-weight: bold;
            color: #FFD700;
        }

        /* Outras Seções */
        section { padding: 80px 20px; max-width: 1200px; margin: auto; }
        
        .ca-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--primary-gold);
            display: inline-block;
            margin: 20px 0;
            cursor: pointer;
        }

        .btn-social {
            text-decoration: none;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .btn-social:hover { border-color: var(--primary-gold); background: rgba(212,175,55,0.1); }

        .hidden { display: none; }
    </style>
</head>
