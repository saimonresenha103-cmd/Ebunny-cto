<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$EBUNNY - The Golden Era (v0.4)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-sand: #F5DEB3; 
            --text-dark: #3E2723; 
        }

        body {
            margin: 0;
            padding-top: 80px; 
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #FFF 0%, var(--bg-sand) 100%);
            color: var(--text-dark);
            text-align: center;
        }

        /* MENU COM ÍCONES */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary-gold);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            gap: 20px;
            z-index: 9999;
        }

        .nav-icon {
            color: var(--primary-gold);
            font-size: 1.5rem;
            text-decoration: none;
            transition: 0.3s;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
        }

        .nav-icon:hover {
            color: #B8860B;
            transform: scale(1.2);
        }

        .nav-btn-text {
            background: var(--primary-gold);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
        }

        header { padding: 2rem; }
        h1 { font-size: 4rem; margin: 0; color: var(--primary-gold); }
        .hero-image { width: 90%; max-width: 500px; border-radius: 20px; border: 3px solid var(--primary-gold); }
        .ca-box { background: white; padding: 15px; border-radius: 50px; border: 2px solid var(--primary-gold); margin: 20px auto; width: 85%; word-break: break-all; font-weight: bold; }
        
        .page-content { display: none; padding: 20px; }
        .active { display: block; }
        
        .btn { 
            background: var(--primary-gold); 
            color: white; 
            padding: 12px 25px; 
            border-radius: 30px; 
            text-decoration: none; 
            display: inline-block;
            font-weight: bold;
            margin: 10px;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="nav-btn-text" onclick="showPage('home')">HOME</button>
        <button class="nav-btn-text" onclick="showPage('earn')">EARN</button>
        <button class="nav-btn-text" onclick="showPage('mission')">MISSION</button>
        
        <a href="https://t.me/ebunny2026" target="_blank" class="nav-icon"><i class="fa-brands fa-telegram"></i></a>
        <a href="https://twitter.com/i/communities/2030089185969983975" target="_blank" class="nav-icon"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" target="_blank" class="nav-icon"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" target="_blank" class="nav-icon"><i class="fa-brands fa-tiktok"></i></a>
    </nav>

    <div id="home" class="page-content active">
        <header>
            <h1>$EBUNNY</h1>
            <p>THE GOLDEN SOLANA ERA</p>
        </header>
        <video src="17668.mp4" class="hero-image" autoplay loop muted playsinline></video>
        <div class="ca-box">2XSSMgjftCwL2xsURjDGZv4FzxZo9Xvx3d5ejrUfXUVm</div>
        <a href="https://t.me/ebunny2026" target="_blank" class="btn" style="background: #0088cc;">Join Telegram</a>
        <button class="btn" onclick="copyCA()">Copy CA</button>
    </div>

    <div id="mission" class="page-content">
        <h2>EASTER MISSION</h2>
        <img src="17763.png" style="width:100%; max-width:500px; border-radius:15px;">
        <p>Support our mission for children in need.</p>
    </div>

    <div id="earn" class="page-content">
        <h2>BUNNY CASINO</h2>
        <p>Connect your wallet to play.</p>
        <button class="btn" onclick="connectWallet()">Connect Phantom</button>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
        function copyCA() {
            navigator.clipboard.writeText("2XSSMgjftCwL2xsURjDGZv4FzxZo9Xvx3d5ejrUfXUVm");
            alert("CA Copied!");
        }
    </script>
</body>
</html>
